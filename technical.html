<!DOCTYPE html>
<html>
<head>
    <title>Technical Events</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .events {
            width: 90%;
            max-width: 650px;
            text-align: center;
        }

        .section-title {
            margin-bottom: 25px;
            font-size: 2rem;
            letter-spacing: 1px;
        }

        .event-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .event-box {
            background: rgba(255,255,255,0.08);
            padding: 18px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }

        .event-box:hover {
            transform: scale(1.03);
            box-shadow: 0 0 15px rgba(0, 200, 255, 0.5);
        }

        .event-box summary {
            font-weight: 600;
            font-size: 17px;
            cursor: pointer;
        }

        .event-box p {
            margin-top: 10px;
            font-size: 14px;
            opacity: 0.8;
        }

        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 28px;
            background: #00c6ff;
            color: black;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 500;
            transition: 0.3s;
        }

        .btn:hover {
            background: white;
            transform: scale(1.05);
        }

        /* ✨ Glow effect */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(0, 200, 255, 0.2);
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
        }

        .glow:nth-child(1) {
            top: 10%;
            left: 10%;
        }

        .glow:nth-child(2) {
            bottom: 10%;
            right: 10%;
        }
    </style>
</head>

<body>

<!-- Glow Background -->
<div class="glow"></div>
<div class="glow"></div>

<section class="events">
    <h2 class="section-title">✈️ Technical Events</h2>

    <div class="event-container">

        <details class="event-box">
            <summary>📄 Paper Presentation</summary>
            <p>Showcase your research and innovative ideas.</p>
        </details>

        <details class="event-box">
            <summary>🛩️ Fixed Wing</summary>
            <p>Design and test your aerodynamic skills.</p>
        </details>

        <details class="event-box">
            <summary>🤖 Drone Coding</summary>
            <p>Code and control drones with precision.</p>
        </details>

        <details class="event-box">
            <summary>🚀 Rocketry</summary>
            <p>Build and launch your own rocket model.</p>
        </details>

        <!-- Register Button -->
        <a href="register.html" class="btn">Register Now</a>

    </div>
</section>

</body>
</html>
