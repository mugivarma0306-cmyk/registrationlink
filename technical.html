<!DOCTYPE html>
<html>
<head>
    <title>Technical Events</title>

    <link rel="stylesheet" href="style.css">

    <style>
        html {
            scroll-behavior: smooth;
        }

        .btn {
            padding: 10px 20px;
            background: blue;
            color: white;
            text-decoration: none;
        }

        .form-section {
            margin-top: 300px;
        }
    </style>
</head>

<body>

<section class="events">
    <h2 class="section-title">✈️ Technical Events</h2>

    <div class="event-container">
        <details class="event-box">
            <summary>Paper Presentation</summary>
            <p>rules</p>
        </details>

        <details class="event-box">
            <summary>Fixedwing</summary>
            <p>rules</p>
        </details>

        <details class="event-box">
            <summary>Dronecoding</summary>
            <p>rules</p>
        </details>

        <details class="event-box">
            <summary>Rocketry</summary>
            <p>rules</p>
        </details>
    </div>

    <!-- Button -->
    <a href="register.html?event=Paper Presentation" class="btn">Register</a>
</section>

<!-- Register Section -->
<section id="register" class="form-section">
    <h2>Register Now</h2>

    <form action="https://formspree.io/f/mlgwknke" method="POST">
        <input type="text" name="name" placeholder="Your Name" required><br><br>
        <input type="email" name="email" placeholder="Your Email" required><br><br>
        <input type="text" name="college" placeholder="College Name" required><br><br>

        <select name="event" required>
            <option value="">Select Event</option>
            <option>Paper Presentation</option>
            <option>Fixedwing</option>
            <option>Dronecoding</option>
            <option>Rocketry</option>
        </select><br><br>

        <button type="submit">Submit Registration</button>
    </form>
</section>

</body>
</html>
