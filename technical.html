<!DOCTYPE html>
<html>
<head>
    <title>Technical Events</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f5f5f5;

            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .events {
            width: 90%;
            max-width: 600px;
            text-align: center;
        }

        .section-title {
            margin-bottom: 20px;
        }

        .event-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .event-box {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            cursor: pointer;
        }

        .event-box summary {
            font-weight: bold;
            font-size: 16px;
        }

        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 25px;
            background: blue;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            background: darkblue;
        }
    </style>
</head>

<body>

<section class="events">
    <h2 class="section-title">✈️ Technical Events</h2>

    <div class="event-container">

        <details class="event-box">
            <summary>Paper Presentation</summary>
            <p>Rules will be updated soon.</p>
            
        </details>

        <details class="event-box">
            <summary>Fixed Wing</summary>
            <p>Rules will be updated soon.</p>
           
        </details>

        <details class="event-box">
            <summary>Drone Coding</summary>
            <p>Rules will be updated soon.</p>
            
        </details>

        <details class="event-box">
            <summary>Rocketry</summary>
            <p>Rules will be updated soon.</p>
            
        </details>
         <a href="register.html" class="btn">Register Now</a>
    </div>

</section>

</body>
</html>
