<!DOCTYPE html>
<html>
<head>
    <title>Aero Symposium 2K26</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI', sans-serif;
        }

        body{
            background:#0a1428;
            color:white;
            overflow:hidden;
        }

        canvas{
            position:fixed;
            width:100%;
            height:100%;
            top:0;
            left:0;
            z-index:-2;
        }

        /* GLOW */
        .glow{
            position:fixed;
            width:300px;
            height:300px;
            border-radius:50%;
            filter:blur(80px);
            z-index:-1;
        }

        .g1{
            background:rgba(59,130,246,0.4);
            top:10%;
            left:10%;
        }

        .g2{
            background:rgba(168,85,247,0.4);
            bottom:10%;
            right:10%;
        }

        /* INTRO */
        #intro{
            position:fixed;
            width:100%;
            height:100%;
            background:rgba(2,6,23,0.9);
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            z-index:1000;
            transition:opacity 1s ease;
        }

        #intro h1{
            color:#3b82f6;
            margin-bottom:20px;
        }

        .loader{
            width:250px;
            height:4px;
            background:#1e293b;
            border-radius:5px;
            overflow:hidden;
        }

        .progress{
            height:100%;
            background:#3b82f6;
            animation:load 3s linear forwards;
        }

        @keyframes load{
            from{width:0%;}
            to{width:100%;}
        }

        /* MAIN */
        #main{
            display:none;
        }

        header{
            text-align:center;
            padding:25px;
            font-size:28px;
        }

        .hero{
            text-align:center;
            padding:100px 20px;
        }

        .btn{
            display:inline-block;
            margin:15px;
            padding:12px 25px;
            background:#3b82f6;
            color:white;
            text-decoration:none;
            border-radius:8px;
            transition:0.3s;
        }

        .btn:hover{
            box-shadow:0 0 15px #3b82f6;
        }
    </style>
</head>

<body>

<canvas id="particles"></canvas>
<div class="glow g1"></div>
<div class="glow g2"></div>

<!-- INTRO -->
<div id="intro">
    <h1>✈ Initializing Airspace...</h1>
    <div class="loader">
        <div class="progress"></div>
    </div>
</div>

<!-- MAIN -->
<div id="main">
    <header>✈️ AERO SYMPOSIUM 2K26</header>

    <div class="hero">
        <h1>Department of Aeronautical Engineering</h1>
        <p>Innovate • Design • Fly 🚀</p>

        <a href="technical.html" class="btn">Technical Events</a>
        <a href="nontechnical.html" class="btn">Non-Tech Events</a>
    </div>
</div>

<script>
/* PARTICLES */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 120; i++) {
    particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*2,
        dx: (Math.random()-0.5)*0.5,
        dy: (Math.random()-0.5)*0.5
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle="white";
        ctx.fill();

        p.x+=p.dx;
        p.y+=p.dy;

        if(p.x<0||p.x>canvas.width) p.dx*=-1;
        if(p.y<0||p.y>canvas.height) p.dy*=-1;
    });

    requestAnimationFrame(animate);
}
animate();

/* INTRO FADE */
setTimeout(()=>{
    const intro = document.getElementById("intro");
    intro.style.opacity = "0";

    setTimeout(()=>{
        intro.style.display="none";
        document.getElementById("main").style.display="block";
    },1000);

},3000);
</script>

</body>
</html>
