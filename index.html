<!DOCTYPE html>
<html>
<head>
    <title>Flight Takeoff</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;

            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;

            background: linear-gradient(to top, #6dd5fa, #ffffff);
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        .runway {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 120px;
            background: #444;
        }

        .plane {
            width: 130px;
            position: absolute;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            transition: transform 4s ease-in-out;
        }

        .fly {
            transform: translate(-50%, -600px) rotate(-25deg);
        }

        .btn {
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            background: #222;
            color: white;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<h1>✈️ Flight Takeoff</h1>

<img src="plane.png" id="plane" class="plane">

<div class="runway"></div>

<button class="btn"
        ontouchstart="startFly()"
        ontouchend="stopFly()"
        onmousedown="startFly()"
        onmouseup="stopFly()">
    Press & Hold to Fly 🚀
</button>

<script>
    let timer;

    function startFly() {
        timer = setTimeout(() => {
            document.getElementById("plane").classList.add("fly");
        }, 500); // hold for 0.5 sec
    }

    function stopFly() {
        clearTimeout(timer);
    }
</script>

</body>
</html>
