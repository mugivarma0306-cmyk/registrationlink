<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aero Symposium 2K26</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:sans-serif;
    color:white;
}

/* GAME CANVAS */
#gameCanvas{
    display:block;
}

/* UI */
#ui{
    position:absolute;
    top:20px;
    left:20px;
}

#enterBtn{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    padding:15px 30px;
    background:#3b82f6;
    border:none;
    color:white;
    font-size:18px;
    display:none;
    cursor:pointer;
}
</style>
</head>

<body>

<canvas id="gameCanvas"></canvas>
<div id="ui">Score: <span id="score">0</span></div>
<button id="enterBtn">ENTER SITE</button>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* PLAYER */
let plane = {
    x:100,
    y:200,
    size:20,
    velocity:0
};

/* GAME */
let gravity = 0.5;
let obstacles = [];
let score = 0;
let gameOver = false;

/* CREATE OBSTACLES */
function createObstacle(){
    let gap = 150;
    let top = Math.random()*canvas.height/2;

    obstacles.push({
        x:canvas.width,
        top:top,
        bottom:top+gap
    });
}

setInterval(createObstacle,1500);

/* CONTROL */
document.onclick = () => {
    plane.velocity = -8;
};

/* GAME LOOP */
function update(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    /* PLANE */
    plane.velocity += gravity;
    plane.y += plane.velocity;

    ctx.fillStyle="white";
    ctx.fillText("✈️",plane.x,plane.y);

    /* OBSTACLES */
    ctx.fillStyle="red";

    obstacles.forEach((obs,i)=>{
        obs.x -= 4;

        ctx.fillRect(obs.x,0,50,obs.top);
        ctx.fillRect(obs.x,obs.bottom,50,canvas.height);

        /* COLLISION */
        if(
            plane.x < obs.x+50 &&
            plane.x+20 > obs.x &&
            (plane.y < obs.top || plane.y > obs.bottom)
        ){
            gameOver = true;
        }

        if(obs.x < -50){
            obstacles.splice(i,1);
            score++;
        }
    });

    document.getElementById("score").innerText = score;

    /* WIN CONDITION */
    if(score >= 5){
        document.getElementById("enterBtn").style.display="block";
        return;
    }

    if(!gameOver){
        requestAnimationFrame(update);
    }else{
        alert("Game Over 😅 Try again");
        location.reload();
    }
}

update();

/* ENTER SITE */
document.getElementById("enterBtn").onclick = ()=>{
    document.body.innerHTML = `
    <h1 style="text-align:center;margin-top:40vh;">
    ✈️ Welcome to Aero Symposium 2K26 🚀
    </h1>`;
};
</script>

</body>
</html>
