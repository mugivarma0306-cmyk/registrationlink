<!DOCTYPE html>
<html>
<head>
    <title>Aero Symposium 2K26</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body{
            background:#0a1428;
            color:white;
            overflow:hidden;
        }

        /* INTRO SCREEN */
        #intro{
            position:fixed;
            width:100%;
            height:100%;
            background:#020617;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            z-index:1000;
        }

        #intro h1{
            color:#3b82f6;
            margin-bottom:20px;
            letter-spacing:2px;
        }

        .loader{
            width:250px;
            height:4px;
            background:#1e293b;
            border-radius:5px;
            overflow:hidden;
        }

        .progress{
            width:0%;
            height:100%;
            background:#3b82f6;
            animation: load 3s linear forwards;
        }

        @keyframes load{
            from{width:0%;}
            to{width:100%;}
        }

        /* MAIN */
        #main{
            display:none;
        }

        header{
            text-align:center;
            padding:25px;
            font-size:28px;
        }

        .hero{
            text-align:center;
            padding:100px 20px;
        }

        .btn{
            display:inline-block;
            margin:15px;
            padding:12px 25px;
            background:#3b82f6;
            color:white;
            text-decoration:none;
            border-radius:8px;
        }
    </style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <h1>✈ Initializing Airspace...</h1>
    <div class="loader">
        <div class="progress"></div>
    </div>
</div>

<!-- MAIN SITE -->
<div id="main">
    <header>✈️ AERO SYMPOSIUM 2K26</header>

    <div class="hero">
        <h1>Department of Aeronautical Engineering</h1>
        <p>Innovate • Design • Fly 🚀</p>

        <a href="technical.html" class="btn">Technical Events</a>
        <a href="nontechnical.html" class="btn">Non-Tech Events</a>
    </div>
</div>

<script>
setTimeout(()=>{
    document.getElementById("intro").style.display="none";
    document.getElementById("main").style.display="block";
},3000);
</script>

</body>
</html>
