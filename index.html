<!DOCTYPE html>
<html>
<head>
    <title>Aero Symposium 2K26</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* RESET */
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body{
            background: linear-gradient(rgba(10,20,40,0.9), rgba(10,20,40,0.95));
            color:#f1f5f9;
            overflow:hidden;
        }

        /* PARTICLES CANVAS */
        #particles{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            z-index:-2;
        }

        /* GLOW */
        .bg-glow{
            position: fixed;
            width:300px;
            height:300px;
            background: radial-gradient(circle, rgba(59,130,246,0.4), transparent);
            border-radius:50%;
            filter: blur(80px);
            z-index:-1;
            animation: moveGlow 12s infinite alternate ease-in-out;
        }

        .bg-glow:nth-child(2){
            top:10%;
            left:10%;
        }

        .bg-glow:nth-child(3){
            bottom:10%;
            right:10%;
            background: radial-gradient(circle, rgba(168,85,247,0.4), transparent);
        }

        @keyframes moveGlow{
            from{ transform: translate(0,0); }
            to{ transform: translate(80px, -40px); }
        }

        /* HEADER */
        header{
            text-align:center;
            padding:25px;
            font-size:28px;
            font-weight:bold;
        }

        /* HERO */
        .hero{
            text-align:center;
            padding:100px 20px;
        }

        .hero h1{
            font-size:40px;
            text-shadow:0 0 15px #3b82f6;
        }

        .hero p{
            margin-top:10px;
            font-size:18px;
        }

        /* BUTTON */
        .btn{
            display:inline-block;
            margin:15px;
            padding:12px 25px;
            background:#3b82f6;
            color:white;
            text-decoration:none;
            border-radius:8px;
            transition:0.3s;
        }

        .btn:hover{
            transform:scale(1.05);
            box-shadow:0 0 15px #3b82f6;
        }

        /* CONTAINER */
        .container{
            width:80%;
            margin:auto;
            text-align:center;
        }

        .section-title{
            margin:20px 0;
            font-size:26px;
        }

        .event-card{
            background: rgba(255,255,255,0.05);
            padding:20px;
            border-radius:10px;
        }

        /* FOOTER */
        footer{
            text-align:center;
            margin-top:40px;
            padding:10px;
            font-size:14px;
        }
    </style>
</head>

<body>

<!-- PARTICLES -->
<canvas id="particles"></canvas>

<!-- GLOW -->
<div class="bg-glow"></div>
<div class="bg-glow"></div>

<!-- HEADER -->
<header>
    ✈️ AERO SYMPOSIUM 2K26
</header>

<!-- HERO -->
<div class="hero">
    <h1>Department of Aeronautical Engineering</h1>
    <p>Innovate • Design • Fly 🚀</p>

    <a href="technical.html" class="btn">Technical Events</a>
    <a href="nontechnical.html" class="btn">Non-Tech Events</a>
</div>

<!-- CONTENT -->
<div class="container">
    <h2 class="section-title">Welcome</h2>

    <div class="event-card">
        <p>
            Join us for an exciting symposium with innovation, creativity, and fun.
        </p>
    </div>
</div>

<!-- FOOTER -->
<footer>
    © 2026 Aero Symposium | Designed by Mukesh
</footer>

<!-- PARTICLE SCRIPT -->
<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 100; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2,
        dx: Math.random() - 0.5,
        dy: Math.random() - 0.5
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle="white";
        ctx.fill();

        p.x += p.dx;
        p.y += p.dy;

        if(p.x<0 || p.x>canvas.width) p.dx*=-1;
        if(p.y<0 || p.y>canvas.height) p.dy*=-1;
    });

    requestAnimationFrame(animate);
}

animate();
</script>
<footer> © 2026 Aero Symposium | Designed by Mukesh </footer>
</body>
</html>
