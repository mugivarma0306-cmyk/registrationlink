<!DOCTYPE html>
<html>
<head>
    <title>Aero Symposium 2K26</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            overflow: hidden;
            color: white;
        }

        /* 🔵 Glow circles */
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(0, 150, 255, 0.3);
            border-radius: 50%;
            filter: blur(100px);
            animation: move 10s infinite alternate;
        }

        .bg-glow:nth-child(1) {
            top: 10%;
            left: 10%;
        }

        .bg-glow:nth-child(2) {
            bottom: 10%;
            right: 10%;
        }

        @keyframes move {
            from { transform: translate(0,0); }
            to { transform: translate(50px,50px); }
        }

        /* 🔝 Navbar */
        nav {
            position: absolute;
            top: 20px;
            right: 40px;
        }

        nav a {
            margin-left: 20px;
            text-decoration: none;
            color: white;
            font-weight: 500;
            transition: 0.3s;
        }

        nav a:hover {
            color: #00c6ff;
        }

        /* 🎯 Hero Section */
        .hero {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            animation: fadeIn 2s ease;
        }

        .hero h1 {
            font-size: 3rem;
            letter-spacing: 2px;
        }

        .hero p {
            margin-top: 10px;
            font-size: 1.2rem;
            opacity: 0.8;
        }

        /* 🔘 Buttons */
        .btn-group {
            margin-top: 30px;
        }

        .btn {
            display: inline-block;
            margin: 10px;
            padding: 12px 25px;
            background: #00c6ff;
            color: black;
            text-decoration: none;
            border-radius: 30px;
            transition: 0.3s;
            font-weight: 500;
        }

        .btn:hover {
            background: white;
            transform: scale(1.05);
        }

        /* ✨ Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 📌 Footer */
        footer {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>

<body>

<!-- Glow Background -->
<div class="bg-glow"></div>
<div class="bg-glow"></div>

<!-- Navbar -->
<nav>
    <a href="technical.html">Technical</a>
    <a href="nontechnical.html">Non-Tech</a>
</nav>

<!-- Hero Section -->
<div class="hero">
    <h1>✈️ AERO SYMPOSIUM 2K26</h1>
    <p>Department of Aeronautical Engineering</p>

    <div class="btn-group">
        <a href="technical.html" class="btn">Explore Technical</a>
        <a href="nontechnical.html" class="btn">Explore Non-Tech</a>
    </div>
</div>

<!-- Footer -->
<footer>
    © 2026 Aero Symposium | Designed by Mukesh
</footer>

</body>
</html>
