<!DOCTYPE html>
<html>
<head>
    <title>Aero Symposium ✈️</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            text-align: center;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            background: linear-gradient(to top, #4facfe, #ffffff);
        }

        h1 {
            font-size: 28px;
            color: #222;
        }

        /* Plane */
        .plane {
            width: 130px;
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            transition: transform 3s ease-in-out;
        }

        .fly {
            transform: translate(-50%, -650px) rotate(-30deg);
        }

        /* Runway */
        .runway {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 120px;
            background: #222;
        }

        /* Button */
        .btn {
            padding: 12px 25px;
            margin-top: 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #111;
            color: white;
            cursor: pointer;
        }

        /* Selection Buttons */
        .options {
            display: none;
            margin-top: 20px;
        }

        .opt-btn {
            padding: 12px 20px;
            margin: 10px;
            border: none;
            border-radius: 10px;
            background: #333;
            color: white;
            cursor: pointer;
        }

        .opt-btn:hover {
            background: #555;
        }
    </style>
</head>

<body>

<h1>✈️ Aero Symposium 2K26</h1>

<img src="plane.png" id="plane" class="plane">

<div class="runway"></div>

<button class="btn"
        onmousedown="startFly()"
        ontouchstart="startFly()">
    Press & Hold to Takeoff 🚀
</button>

<div class="options" id="options">
    <button class="opt-btn" onclick="goTech()">💻 Tech Events</button>
    <button class="opt-btn" onclick="goNonTech()">🎉 Non-Tech Events</button>
</div>

<script>
function startFly() {
    document.getElementById("plane").classList.add("fly");

    setTimeout(() => {
        document.getElementById("options").style.display = "block";
    }, 2000);
}

function goTech() {
    window.location.href = "tech.html";
}

function goNonTech() {
    window.location.href = "nontech.html";
}
</script>

</body>
</html>
