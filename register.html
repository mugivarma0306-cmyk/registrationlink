<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
            background: #f5f5f5;
        }

        .form-section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            text-align: center;
        }

        input, select {
            display: block;
            width: 250px;
            margin: 10px auto;
            padding: 10px;
        }

        button {
            padding: 10px 20px;
            background: blue;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<section class="form-section">
    <h2>Register Now</h2>

    <form action="https://formspree.io/f/mlgwknke" method="POST">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <input type="text" name="college" placeholder="College Name" required>

       <select name="event" required>
    <option value="">Select Event</option>

    <optgroup label="✈️ Technical Events">
        <option>Paper Presentation</option>
        <option>Fixed Wing</option>
        <option>Drone Coding</option>
        <option>Rocketry</option>
    </optgroup>

    <optgroup label="🎉 Non-Technical Events">
        <option>Glider Challenge</option>
        <option>Visual Puzzle</option>
        <option>Aero Quiz</option>
        <option>Free Fire</option>
    </optgroup>
</select>
        <button type="submit">Submit Registration</button>
    </form>
</section>

<!-- ✅ Script must be here -->
<script>
    const params = new URLSearchParams(window.location.search);
    const event = params.get("event");

    if (event) {
        document.querySelector("select[name='event']").value = event;
    }
</script>

</body>
</html>
