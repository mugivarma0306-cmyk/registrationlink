<!DOCTYPE html>
<html>
<head>
    <title>Register - Aero Symposium</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Poppins', sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            overflow:hidden;
            color:white;
        }

        /* 🌌 PARTICLES */
        #particles{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            z-index:-2;
        }

        /* 🔵 GLOW */
        .glow{
            position:absolute;
            width:300px;
            height:300px;
            background: rgba(0,200,255,0.3);
            border-radius:50%;
            filter: blur(100px);
            z-index:-1;
            animation: float 6s infinite alternate;
        }

        .glow:nth-child(2){
            top:10%;
            left:10%;
        }

        .glow:nth-child(3){
            bottom:10%;
            right:10%;
        }

        @keyframes float{
            from{ transform: translateY(0); }
            to{ transform: translateY(40px); }
        }

        /* 📦 FORM BOX */
        .form-section{
            background: rgba(255,255,255,0.08);
            padding:30px;
            border-radius:15px;
            backdrop-filter: blur(10px);
            text-align:center;
            box-shadow:0 0 20px rgba(0,0,0,0.5);
            width:300px;
        }

        .form-section h2{
            margin-bottom:20px;
        }

        input, select{
            width:100%;
            padding:10px;
            margin:10px 0;
            border:none;
            border-radius:8px;
            outline:none;
        }

        input:focus, select:focus{
            box-shadow:0 0 10px #00c6ff;
        }

        button{
            width:100%;
            padding:12px;
            background:#00c6ff;
            color:black;
            border:none;
            border-radius:8px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:white;
            transform:scale(1.05);
        }
    </style>
</head>

<body>

<!-- PARTICLES -->
<canvas id="particles"></canvas>

<!-- GLOW -->
<div class="glow"></div>
<div class="glow"></div>

<!-- FORM -->
<section class="form-section">
    <h2>Register Now</h2>

    <form action="https://formspree.io/f/mlgwknke" method="POST">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <input type="text" name="college" placeholder="College Name" required>

        <select name="event" required>
            <option value="">Select Event</option>

            <optgroup label="✈️ Technical Events">
                <option>Paper Presentation</option>
                <option>Fixed Wing</option>
                <option>Drone Coding</option>
                <option>Rocketry</option>
            </optgroup>

            <optgroup label="🎉 Non-Technical Events">
                <option>Glider Challenge</option>
                <option>Visual Puzzle</option>
                <option>Aero Quiz</option>
                <option>Free Fire</option>
            </optgroup>
        </select>

        <button type="submit">Submit Registration</button>
    </form>
</section>

<!-- AUTO SELECT EVENT -->
<script>
const params = new URLSearchParams(window.location.search);
const event = params.get("event");

if (event) {
    document.querySelector("select[name='event']").value = event;
}
</script>

<!-- PARTICLES SCRIPT -->
<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 80; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2,
        dx: Math.random() - 0.5,
        dy: Math.random() - 0.5
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle="white";
        ctx.fill();

        p.x += p.dx;
        p.y += p.dy;

        if(p.x<0 || p.x>canvas.width) p.dx*=-1;
        if(p.y<0 || p.y>canvas.height) p.dy*=-1;
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
